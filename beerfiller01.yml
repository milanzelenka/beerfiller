binary_sensor:
  - platform: gpio
    name: "${devtitle} Power Switch"
    id: "${devname}_power_switch"
    icon: "mdi:power"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 0
      mode: INPUT
      inverted: true
    on_state:
      then:
        - script.execute: "${devname}_onoff_state"
    filters:
      - delayed_on_off: 50ms  # debounce

  - platform: gpio
    name: "${devtitle} A Button OK"
    id: "${devname}_a_button_ok"
    icon: "mdi:gesture-tap-button"
    pin:
      pcf8574: pcf8574_hub_in_2
      number: 6
      mode: INPUT
      inverted: true
    on_click:
    - min_length: 50ms
      max_length: 1499ms
      then:
        - if:
            condition:
              - binary_sensor.is_on: "${devname}_power_switch"
              - light.is_on: "${devname}_a_led_ok"
            then:
              - switch.turn_on: "${devname}_script_a_bottle_remove_control"
              - delay: 1000ms
    - min_length: 1500ms
      max_length: 10000ms
      then:
        - logger.log: "A OK LONG press..."
        - switch.turn_off: "${devname}_script_a_bottle_remove_control"
  
  - platform: gpio
    name: "${devtitle} A Button StartStop"
    id: "${devname}_a_button_startstop"
    icon: "mdi:restart"
    pin:
      pcf8574: pcf8574_hub_in_2
      number: 7
      mode: INPUT
      inverted: true
    on_click:
