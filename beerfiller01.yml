substitutions:
  devname: 'beerfiller01'
  devtitle: 'BeerFiller'
  project: 'pivovar66'

globals:
  - id: millis_send
    type: int
    restore_value: false
    initial_value: '0'
  - id: millis_diff
    type: int
    restore_value: false
    initial_value: '0'
  - id: error_state
    type: int
    restore_value: false
    initial_value: '0'
  
esphome:
  name: "${devname}"
  project:
    name: "esphome.${project}"
    version: "1.0"
  on_boot:
    priority: -100
    then:
      - wait_until:
          condition:
            lambda: |-
              return id(${devname}_power_switch).has_state();
          timeout: 2s
      - script.execute: "${devname}_apply_bottle_volume"
      - script.execute: "${devname}_onoff_state"

esp32:
  variant: esp32
  framework:
    type: esp-idf

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_pass
    - ssid: !secret wifi_ssid_bck
      password: !secret wifi_pass_bck

#ethernet:
#  type: LAN8720
#  mdc_pin: GPIO23
#  mdio_pin: GPIO18
#  clk_mode: GPIO17_OUT
#  phy_addr: 0
#  manual_ip:
#    static_ip: 10.69.0.80
#    gateway: 10.69.0.1
#    subnet: 255.255.255.0
#    dns1: 10.69.0.1

api:
  encryption:
    key: !secret api_key
  reboot_timeout: "0s"

ota:
  platform: esphome
  password: !secret api_pass
    
logger:
  level: INFO # DEBUG #WARN

web_server:
  port: 80
  version: 2
  local: true

i2c:
  sda: 4
  scl: 5
  scan: true
  id: bus_a

mcp23017:
  - id: 'mcp23017_hub_ext'
    address: 0x20

pcf8574:
  - id: 'pcf8574_hub_out_1'  # for output channel 1-8
    address: 0x24

  - id: 'pcf8574_hub_out_2'  # for output channel 9-16
    address: 0x25

  - id: 'pcf8574_hub_in_1'  # for input channel 1-8
    address: 0x22

  - id: 'pcf8574_hub_in_2'  # for input channel 9-16
    address: 0x21

# Reay outputs
switch:
  - platform: gpio
    name: "${devtitle} A Valve Air"
    id: "${devname}_a_valve_air"
    icon: "mdi:pipe-valve"
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 0
      mode: OUTPUT
      inverted: true
    interlock:
      - "${devname}_a_valve_beer"

  - platform: gpio
    name: "${devtitle} A Valve Beer"
    id: "${devname}_a_valve_beer"
    icon: "mdi:pipe-valve"
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 1
      mode: OUTPUT
      inverted: true
    interlock:
      - "${devname}_a_valve_air"

  - platform: gpio
    name: "${devtitle} A Valve Drain"
    id: "${devname}_a_valve_drain"
    icon: "mdi:pipe-valve"
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 2
      mode: OUTPUT
      inverted: true

  - platform: gpio
    name: "${devtitle} A Valve Drizzle"
    id: "${devname}_a_valve_drizzle"
    icon: "mdi:pipe-valve"
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 3
      mode: OUTPUT
      inverted: true

  - platform: gpio
    name: "${devtitle} B Valve Air"
    id: "${devname}_b_valve_air"
    icon: "mdi:pipe-valve"
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 4
      mode: OUTPUT
      inverted: true
    interlock:
      - "${devname}_b_valve_beer"

  - platform: gpio
    name: "${devtitle} B Valve Beer"
    id: "${devname}_b_valve_beer"
    icon: "mdi:pipe-valve"
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 5
      mode: OUTPUT
      inverted: true
    interlock:
      - "${devname}_b_valve_air"

  - platform: gpio
    name: "${devtitle} B Valve Drain"
    id: "${devname}_b_valve_drain"
    icon: "mdi:pipe-valve"
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 6
      mode: OUTPUT
      inverted: true

  - platform: gpio
    name: "${devtitle} B Valve Drizzle"
    id: "${devname}_b_valve_drizzle"
    icon: "mdi:pipe-valve"
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 7
      mode: OUTPUT
      inverted: true

  - platform: gpio
    name: "${devtitle} C Valve Air"
    id: "${devname}_c_valve_air"
    icon: "mdi:pipe-valve"
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_2
      number: 0
      mode: OUTPUT
      inverted: true
    interlock:
      - "${devname}_c_valve_beer"

  - platform: gpio
    name: "${devtitle} C Valve Beer"
    id: "${devname}_c_valve_beer"
    icon: "mdi:pipe-valve"
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_2
      number: 4 # PIN 1 on HUB 2 is BAD => MOVED TO PIN 4
      mode: OUTPUT
      inverted: true
    interlock:
      - "${devname}_c_valve_air"

  - platform: gpio
    name: "${devtitle} C Valve Drain"
    id: "${devname}_c_valve_drain"
    icon: "mdi:pipe-valve"
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_2
      number: 2
      mode: OUTPUT
      inverted: true

  - platform: gpio
    name: "${devtitle} C Valve Drizzle"
    id: "${devname}_c_valve_drizzle"
    icon: "mdi:pipe-valve"
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_2
      number: 3
      mode: OUTPUT
      inverted: true

### SCRIPT SWITCHES (for starting/stopping scripts)
  - platform: template
    id: "${devname}_script_a_filling_control"
    name: "${devtitle} Script A Filling Cycle"
    lambda: 'return (id(${devname}_script_a_filling_cycle).is_running());'
    turn_on_action:
      - script.execute: "${devname}_script_a_filling_cycle"
    turn_off_action:
      - script.stop: "${devname}_script_a_filling_cycle"
      - switch.turn_off: "${devname}_a_valve_air"
      - switch.turn_off: "${devname}_a_valve_beer"
      - lambda: 'id(${devname}_a_led_startstop).turn_on().set_effect("none").perform();'
      - lambda: 'id(${devname}_a_led_ok).turn_on().set_effect("none").perform();'
      - delay: 1s
      - light.turn_off: { id: "${devname}_a_led_ok" }
      - logger.log: { format: "*** FILLING A: SCRIPT CANCELED", level: INFO }

  - platform: template
    id: "${devname}_script_a_bottle_remove_control"
    name: "${devtitle} Script A Bottle Remove"
    lambda: 'return (id(${devname}_script_a_bottle_remove).is_running());'
    turn_on_action:
      - script.execute: "${devname}_script_a_bottle_remove"
    turn_off_action:
      - script.stop: "${devname}_script_a_bottle_remove"
      - switch.turn_off: "${devname}_a_valve_air"
      - switch.turn_off: "${devname}_a_valve_beer"
      - switch.turn_on: "${devname}_a_valve_drizzle"
      - lambda: 'id(${devname}_a_led_startstop).turn_on().set_effect("none").perform();'
      - lambda: 'id(${devname}_a_led_ok).turn_on().set_effect("none").perform();'
      - delay: 1s
      - light.turn_off: { id: "${devname}_a_led_ok" }
      - logger.log: { format: "*** REMOVE A: SCRIPT CANCELED", level: INFO }

  - platform: template
    id: "${devname}_script_b_filling_control"
    name: "${devtitle} Script B Filling Cycle"
    lambda: 'return (id(${devname}_script_b_filling_cycle).is_running());'
    turn_on_action:
      - script.execute: "${devname}_script_b_filling_cycle"
    turn_off_action:
      - script.stop: "${devname}_script_b_filling_cycle"
      - switch.turn_off: "${devname}_b_valve_air"
      - switch.turn_off: "${devname}_b_valve_beer"
      - lambda: 'id(${devname}_b_led_startstop).turn_on().set_effect("none").perform();'
      - lambda: 'id(${devname}_b_led_ok).turn_on().set_effect("none").perform();'
      - delay: 1s
      - light.turn_off: { id: "${devname}_b_led_ok" }
      - logger.log: { format: "*** FILLING B: SCRIPT CANCELED", level: INFO }

  - platform: template
    id: "${devname}_script_b_bottle_remove_control"
