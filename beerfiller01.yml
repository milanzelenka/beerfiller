# Service buttons
button:
  - platform: safe_mode
    id: "${devname}_safe_mode_boot"
    name: Safe Mode Boot
    entity_category: diagnostic

  - platform: restart
    id: "${devname}_restart_device"
    name: "Restart Device"

sensor:
# ***** A Pulses *****
  - platform: pulse_counter
    id: "${devname}_a_pulse_counter"
    name: "${devtitle} A Pulse Rate"
    internal: true  # non internal is useless for production use
    pin:
      number: GPIO32
      mode:
        input: true
        pullup: false

    count_mode:
      rising_edge: DISABLE
      falling_edge: INCREMENT

    use_pcnt: true
    internal_filter: 13us
    update_interval: 50ms

    unit_of_measurement: "pulses/min"
    accuracy_decimals: 0
    entity_category: diagnostic

    total:
      id: "${devname}_a_pulse_total"
      name: "${devtitle} A Filling Pulses"
      internal: true  # non internal is useless for production use
      unit_of_measurement: "pulses"
      accuracy_decimals: 0
      state_class: measurement

  - platform: template
    id: "${devname}_a_filled_volume_ml"
    name: "${devtitle} A Filled Volume"
    icon: "mdi:cup-water"
    unit_of_measurement: "ml"
    accuracy_decimals: 0
    update_interval: 500ms
    filters:
      - delta: 1.0
    lambda: |-
      if (isnan(id(${devname}_a_pulse_total).state) ||
          isnan(id(${devname}_ml_per_pulse).state)) {
        return 0.0f;
      }

      return id(${devname}_a_pulse_total).state
             * id(${devname}_ml_per_pulse).state;

  - platform: template
    id: "${devname}_a_effective_target_volume_ml"
    name: "${devtitle} A Effective Target Volume"
    icon: "mdi:target"
    unit_of_measurement: "ml"
    accuracy_decimals: 0
    update_interval: 1s
    filters:
      - delta: 1.0
    lambda: |-
      if (isnan(id(${devname}_bottle_volume_ml).state) ||
          isnan(id(${devname}_volume_correction_ml).state)) {
        return 0.0f;
      }

      const float target =
        id(${devname}_bottle_volume_ml).state +
        id(${devname}_volume_correction_ml).state;

      return std::max(0.0f, target);

# **** B Pulses ***

