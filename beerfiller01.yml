# LED Outputs on external MCP23017 board (I2C)
output:
  - platform: gpio
    id: "${devname}_output_a_led_yellow"
    pin:
      mcp23xxx: mcp23017_hub_ext
      number: 0 #A0
      mode: OUTPUT
      inverted: true
  - platform: gpio
    id: "${devname}_output_a_led_green"
    pin:
      mcp23xxx: mcp23017_hub_ext
      number: 1 #A1
      mode: OUTPUT
      inverted: true
  - platform: gpio
    id: "${devname}_output_b_led_yellow"
    pin:
      mcp23xxx: mcp23017_hub_ext
      number: 2 #A2
      mode: OUTPUT
      inverted: true
  - platform: gpio
    id: "${devname}_output_b_led_green"
    pin:
      mcp23xxx: mcp23017_hub_ext
      number: 3 #A3
      mode: OUTPUT
      inverted: true
  - platform: gpio
    id: "${devname}_output_c_led_yellow"
    pin:
      mcp23xxx: mcp23017_hub_ext
      number: 4 #A4
      mode: OUTPUT
      inverted: true
  - platform: gpio
    id: "${devname}_output_c_led_green"
    pin:
      mcp23xxx: mcp23017_hub_ext
      number: 5 #A5
      mode: OUTPUT
      inverted: true

# LED Lights definitions
light:
  - platform: binary
    name: "${devtitle} A LED OK"
    id: "${devname}_a_led_ok"
    icon: "mdi:lightbulb"
    output: "${devname}_output_a_led_yellow"
    restore_mode: ALWAYS_OFF
    effects:
      - strobe:
          name: blinking
          colors: 
            - state: true
              duration: 1s
            - state: false
              duration: 700ms
  - platform: binary
    name: "${devtitle} A LED StartStop"
    id: "${devname}_a_led_startstop"
    icon: "mdi:lightbulb"
    output: "${devname}_output_a_led_green"
