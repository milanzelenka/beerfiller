        - if:
            condition:
              - binary_sensor.is_on: "${devname}_power_switch"
              - light.is_on: "${devname}_c_led_ok"
            then:
              - switch.turn_on: "${devname}_script_c_bottle_remove_control"
              - delay: 1000ms
    - min_length: 1500ms
      max_length: 10000ms
      then:
        - logger.log: "C OK LONG press..."
        - switch.turn_off: "${devname}_script_c_bottle_remove_control"
  
  - platform: gpio
    name: "${devtitle} C Button StartStop"
    id: "${devname}_c_button_startstop"
    icon: "mdi:restart"
    pin:
      pcf8574: pcf8574_hub_in_2
      number: 3
      mode: INPUT
      inverted: true
    on_click:
    - min_length: 50ms
      max_length: 1499ms
      then:
        - if:
            condition:
              - binary_sensor.is_on: "${devname}_power_switch"
              - light.is_on: "${devname}_c_led_startstop"
            then:
              - switch.turn_on: "${devname}_script_c_filling_control"
              - delay: 1000ms
    - min_length: 1500ms
      max_length: 10000ms
      then:
        - logger.log: "C StartStop LONG press..."
        - switch.turn_off: "${devname}_script_c_filling_control"
  - platform: template
    id: "${devname}_a_bottle_full"
    name: "${devtitle} A Bottle Full"
    icon: "mdi:bottle-soda-classic"
    lambda: |-
      const float pulses = id(${devname}_a_pulse_total).state;
      const float bottle_volume = id(${devname}_bottle_volume_ml).state;
      const float correction = id(${devname}_volume_correction_ml).state;
      const float ml_per_pulse = id(${devname}_ml_per_pulse).state;
      if (isnan(pulses) || isnan(bottle_volume) || isnan(correction) || isnan(ml_per_pulse) || ml_per_pulse <= 0.0f) { return false; }
      const float effective_volume = std::max(0.0f, bottle_volume + correction);
      if (effective_volume < ml_per_pulse) { return false; }
      const int target_pulses = static_cast<int>(ceilf(effective_volume / ml_per_pulse));
      const int current_pulses = static_cast<int>(lroundf(pulses));
      return current_pulses >= target_pulses;

  - platform: template
    id: "${devname}_b_bottle_full"
    name: "${devtitle} B Bottle Full"
    icon: "mdi:bottle-soda-classic"
    lambda: |-
      const float pulses = id(${devname}_b_pulse_total).state;
      const float bottle_volume = id(${devname}_bottle_volume_ml).state;
      const float correction = id(${devname}_volume_correction_ml).state;
      const float ml_per_pulse = id(${devname}_ml_per_pulse).state;
      if (isnan(pulses) || isnan(bottle_volume) || isnan(correction) || isnan(ml_per_pulse) || ml_per_pulse <= 0.0f) { return false; }
      const float effective_volume = std::max(0.0f, bottle_volume + correction);
      if (effective_volume < ml_per_pulse) { return false; }
      const int target_pulses = static_cast<int>(ceilf(effective_volume / ml_per_pulse));
      const int current_pulses = static_cast<int>(lroundf(pulses));
      return current_pulses >= target_pulses;
  
number:
  - platform: template
    name: "${devtitle} CO2 Lavage Duration (sec)"
    id: "${devname}_lavage_duration_sec"
    optimistic: true
    min_value: 1
    max_value: 20
    step: 1
    initial_value: 5
    restore_value: true
    icon: "mdi:timer"
  - platform: template
    name: "${devtitle} Presurize Duration (ms)"
    id: "${devname}_presurize_duration_ms"
    optimistic: true
    min_value: 100
    max_value: 5000
    step: 100
    initial_value: 2000
    restore_value: true
    icon: "mdi:timer"
  - platform: template
    name: "${devtitle} Start Filling Delay (ms)"
    id: "${devname}_start_filling_delay_ms"
    optimistic: true
    min_value: 100
    max_value: 5000
    step: 100
    initial_value: 1000
    restore_value: true
    icon: "mdi:timer"
  - platform: template
    name: "${devtitle} Filling Timeout (sec)"
    id: "${devname}_filling_timeout_sec"
    optimistic: true
    min_value: 30
    max_value: 300
    step: 1
    initial_value: 120
    restore_value: true
    icon: "mdi:timer"
  - platform: template
    name: "${devtitle} Filling De-pressurize Delay (ms)"
    id: "${devname}_filling_depress_delay_ms"
    optimistic: true
    min_value: 0
    max_value: 5000
    step: 100
    initial_value: 1000
    restore_value: true
    icon: "mdi:timer"
  - platform: template
    name: "${devtitle} CO2-Shock Length (ms)"
    id: "${devname}_co2_shock_length_ms"
    optimistic: true
    min_value: 0
    max_value: 500
    step: 1
    initial_value: 10
    restore_value: true
    icon: "mdi:timer"
  - platform: template
    name: "${devtitle} Post Shock Delay (ms)"
    id: "${devname}_post_shock_delay_ms"
    optimistic: true
    min_value: 0
    max_value: 5000
    step: 100
    initial_value: 1000
    restore_value: true
    icon: "mdi:timer"
  - platform: template
    id: "${devname}_bottle_volume_ml"
    name: "${devtitle} Bottle Volume"
    icon: "mdi:bottle-soda"
    unit_of_measurement: "ml"
    min_value: 0
    max_value: 5000
    step: 10
    initial_value: 750
    restore_value: true
    optimistic: true
    mode: box
  - platform: template
    id: "${devname}_volume_correction_ml"
    name: "${devtitle} Volume Correction"
    icon: "mdi:tune-vertical"
    unit_of_measurement: "ml"
    min_value: -100
    max_value: 100
    step: 10
    initial_value: 0
    restore_value: true
    optimistic: true
    mode: slider
  - platform: template
    id: "${devname}_ml_per_pulse"
    name: "${devtitle} Milliliters Per Pulse"
    icon: "mdi:pulse"
    unit_of_measurement: "ml"
    min_value: 0.1
    max_value: 100
    step: 0.1
    initial_value: 10
    restore_value: true
    optimistic: true
    mode: box
    entity_category: config

select:
  - platform: template
    id: "${devname}_bottle_volume_select"
    name: "${devtitle} Bottle Volume"
    icon: mdi:bottle-soda
    optimistic: true
    restore_value: true
    initial_option: "Off"

    options:
      - "Off"
      - "330 ml"
      - "500 ml"
      - "750 ml"
      - "1 l"
      - "1.5 l"

    on_value:
      then:
        - script.execute: "${devname}_apply_bottle_volume"

script:
  # Bottle Volume Select Apply
  - id: "${devname}_apply_bottle_volume"
    mode: restart
    then:
      - lambda: |-
          const std::string option = id(${devname}_bottle_volume_select).current_option();
          float volume_ml = 0;

          if (option == "330 ml") { volume_ml = 330; }
            else if (option == "500 ml") { volume_ml = 500; }
              else if (option == "750 ml") { volume_ml = 750; }
                else if (option == "1 l") { volume_ml = 1000; }
                  else if (option == "1.5 l") { volume_ml = 1500; }

          auto call = id(${devname}_bottle_volume_ml).make_call();
          call.set_value(volume_ml);
          call.perform();
  # On/Off sequence
  - id: "${devname}_onoff_state"
    mode: restart
    then:
      - if:
          condition:
            binary_sensor.is_on: "${devname}_power_switch"
          then:
            - light.turn_on: { id: "${devname}_a_led_startstop" }
            - light.turn_on: { id: "${devname}_a_led_ok" }
            - light.turn_on: { id: "${devname}_b_led_startstop" }
            - light.turn_on: { id: "${devname}_b_led_ok" }
            - light.turn_on: { id: "${devname}_c_led_startstop" }
            - light.turn_on: { id: "${devname}_c_led_ok" }
            - pulse_counter.set_total_pulses:
                id: "${devname}_a_pulse_counter"
                value: 0
            - pulse_counter.set_total_pulses:
                id: "${devname}_b_pulse_counter"
                value: 0
            - component.update: "${devname}_a_pulse_counter"
            - delay: 1s
            - light.turn_off: { id: "${devname}_a_led_ok" }
            - light.turn_off: { id: "${devname}_b_led_ok" }
            - light.turn_off: { id: "${devname}_c_led_ok" }
            - switch.turn_off: "${devname}_a_valve_air"
            - switch.turn_off: "${devname}_a_valve_beer"
            - switch.turn_off: "${devname}_a_valve_drizzle"
            - switch.turn_on: "${devname}_a_valve_drain"
            - switch.turn_off: "${devname}_b_valve_air"
            - switch.turn_off: "${devname}_b_valve_beer"
            - switch.turn_off: "${devname}_b_valve_drizzle"
            - switch.turn_on: "${devname}_b_valve_drain"
            - switch.turn_off: "${devname}_c_valve_air"
            - switch.turn_off: "${devname}_c_valve_beer"
            - switch.turn_off: "${devname}_c_valve_drizzle"
            - switch.turn_on: "${devname}_c_valve_drain"
            - logger.log: { format: "* POWERED ON *", level: INFO }
          else:
            - light.turn_off: { id: "${devname}_a_led_startstop" }
            - light.turn_off: { id: "${devname}_a_led_ok" }
            - light.turn_off: { id: "${devname}_b_led_startstop" }
            - light.turn_off: { id: "${devname}_b_led_ok" }
            - light.turn_off: { id: "${devname}_c_led_startstop" }
            - light.turn_off: { id: "${devname}_c_led_ok" }
            - switch.turn_off: "${devname}_a_valve_air"
            - switch.turn_off: "${devname}_a_valve_beer"
            - switch.turn_off: "${devname}_a_valve_drizzle"
            - switch.turn_off: "${devname}_a_valve_drain"
            - switch.turn_off: "${devname}_b_valve_air"
            - switch.turn_off: "${devname}_b_valve_beer"
            - switch.turn_off: "${devname}_b_valve_drizzle"
            - switch.turn_off: "${devname}_b_valve_drain"
            - switch.turn_off: "${devname}_c_valve_air"
            - switch.turn_off: "${devname}_c_valve_beer"
            - switch.turn_off: "${devname}_c_valve_drizzle"
            - switch.turn_off: "${devname}_c_valve_drain"
            - logger.log: { format: "* POWERED OFF *", level: INFO }

  # SCRIPT: FILLING CYCLE
  - id: "${devname}_script_a_filling_cycle"
    mode: single
    then:
      - logger.log: { format: "*** FILLING A: SCRIPT STARTED...", level: INFO }
      - lambda: 'id(${devname}_a_led_startstop).turn_on().set_effect("blinking").perform();'
      - light.turn_off: { id: "${devname}_a_led_ok" }
      - logger.log: { format: "* FILLING A: CO2 Lavage", level: INFO }
      - switch.turn_off: "${devname}_a_valve_beer"
      - switch.turn_on: "${devname}_a_valve_drizzle"
      - switch.turn_on: "${devname}_a_valve_drain"
      - switch.turn_on: "${devname}_a_valve_air"
      - delay: !lambda "return (id(${devname}_lavage_duration_sec).state * 1000);"
      - switch.turn_off: "${devname}_a_valve_drain"
      - switch.turn_off: "${devname}_a_valve_drizzle"
      - logger.log: { format: "* FILLING A: CO2 Lavage complete, pressurizing...", level: INFO }
      - delay: !lambda "return (id(${devname}_presurize_duration_ms).state);"
      - switch.turn_off: "${devname}_a_valve_air"
      - logger.log: { format: "* FILLING A: Flow sensor pulses reset", level: INFO }
      - pulse_counter.set_total_pulses:
          id: "${devname}_a_pulse_counter"
          value: 0
      - component.update: "${devname}_a_pulse_counter"
      - logger.log: { format: "* FILLING A: Filling Started", level: INFO }
      - switch.turn_on: "${devname}_a_valve_drizzle"
      - delay: !lambda "return (id(${devname}_start_filling_delay_ms).state);"
      - switch.turn_on: "${devname}_a_valve_beer"
      - wait_until:
          condition:
            or:
              - binary_sensor.is_on: "${devname}_a_button_startstop"
              - binary_sensor.is_on: "${devname}_a_bottle_full"
          timeout: !lambda "return static_cast<uint32_t>(id(${devname}_filling_timeout_sec).state * 1000.0f);"
      - switch.turn_off: "${devname}_a_valve_beer"
      - light.turn_off: { id: "${devname}_a_led_startstop" }
      - logger.log: { format: "* FILLING A: Filling stopped, continue de-pressurization", level: INFO }
      - delay: !lambda "return (id(${devname}_filling_depress_delay_ms).state);"
      - logger.log: { format: "* FILLING A: De-presurization done, bottle ready for removal process...", level: INFO }
      - switch.turn_off: "${devname}_a_valve_drizzle"
      - light.turn_on: { id: "${devname}_a_led_ok" }
      - logger.log: { format: "*** FILLING A: SCRIPT ENDED.", level: INFO }

  - id: "${devname}_script_b_filling_cycle"
    mode: single
    then:
      - logger.log: { format: "*** FILLING B: SCRIPT STARTED...", level: INFO }
      - lambda: 'id(${devname}_b_led_startstop).turn_on().set_effect("blinking").perform();'
      - light.turn_off: { id: "${devname}_b_led_ok" }
      - logger.log: { format: "* FILLING B: CO2 Lavage", level: INFO }
      - switch.turn_off: "${devname}_b_valve_beer"
      - switch.turn_on: "${devname}_b_valve_drizzle"
      - switch.turn_on: "${devname}_b_valve_drain"
      - switch.turn_on: "${devname}_b_valve_air"
      - delay: !lambda "return (id(${devname}_lavage_duration_sec).state * 1000);"
      - switch.turn_off: "${devname}_b_valve_drain"
      - switch.turn_off: "${devname}_b_valve_drizzle"
      - logger.log: { format: "* FILLING B: CO2 Lavage complete, pressurizing...", level: INFO }
      - delay: !lambda "return (id(${devname}_presurize_duration_ms).state);"
      - switch.turn_off: "${devname}_b_valve_air"
      - logger.log: { format: "* FILLING B: Flow sensor pulses reset", level: INFO }
      - pulse_counter.set_total_pulses:
          id: "${devname}_b_pulse_counter"
          value: 0
      - component.update: "${devname}_b_pulse_counter"
      - logger.log: { format: "* FILLING B: Filling Started", level: INFO }
      - switch.turn_on: "${devname}_b_valve_drizzle"
      - delay: !lambda "return (id(${devname}_start_filling_delay_ms).state);"
      - switch.turn_on: "${devname}_b_valve_beer"
      - wait_until:
          condition:
            or:
              - binary_sensor.is_on: "${devname}_b_button_startstop"
              - binary_sensor.is_on: "${devname}_b_bottle_full"
          timeout: !lambda "return static_cast<uint32_t>(id(${devname}_filling_timeout_sec).state * 1000.0f);"
      - switch.turn_off: "${devname}_b_valve_beer"
      - light.turn_off: { id: "${devname}_b_led_startstop" }
      - logger.log: { format: "* FILLING B: Filling stopped, continue de-pressurization", level: INFO }
      - delay: !lambda "return (id(${devname}_filling_depress_delay_ms).state);"
      - logger.log: { format: "* FILLING B: De-presurization done, bottle ready for removal process...", level: INFO }
      - switch.turn_off: "${devname}_b_valve_drizzle"
      - light.turn_on: { id: "${devname}_b_led_ok" }
      - logger.log: { format: "*** FILLING B: SCRIPT ENDED.", level: INFO }

  - id: "${devname}_script_c_filling_cycle"
    mode: single
    then:
      - logger.log: { format: "*** FILLING C: SCRIPT STARTED...", level: INFO }
      - lambda: 'id(${devname}_c_led_startstop).turn_on().set_effect("blinking").perform();'
      - light.turn_off: { id: "${devname}_c_led_ok" }
      - logger.log: { format: "* FILLING C: CO2 Lavage", level: INFO }
      - switch.turn_off: "${devname}_c_valve_beer"
      - switch.turn_on: "${devname}_c_valve_drizzle"
      - switch.turn_on: "${devname}_c_valve_drain"
      - switch.turn_on: "${devname}_c_valve_air"
      - delay: !lambda "return (id(${devname}_lavage_duration_sec).state * 1000);"
      - switch.turn_off: "${devname}_c_valve_drain"
      - switch.turn_off: "${devname}_c_valve_drizzle"
      - logger.log: { format: "* FILLING C: CO2 Lavage complete, pressurizing...", level: INFO }
      - delay: !lambda "return (id(${devname}_presurize_duration_ms).state);"
      - switch.turn_off: "${devname}_c_valve_air"
      - logger.log: { format: "* FILLING C: Filling Started", level: INFO }
      - switch.turn_on: "${devname}_c_valve_drizzle"
      - delay: !lambda "return (id(${devname}_start_filling_delay_ms).state);"
      - switch.turn_on: "${devname}_c_valve_beer"
      - wait_until:
          condition: { binary_sensor.is_on: "${devname}_c_button_startstop" }
          timeout: !lambda "return (id(${devname}_filling_timeout_sec).state * 1000);"
      - switch.turn_off: "${devname}_c_valve_beer"
      - light.turn_off: { id: "${devname}_c_led_startstop" }
      - logger.log: { format: "* FILLING C: Filling stopped, continue de-pressurization", level: INFO }
      - delay: !lambda "return (id(${devname}_filling_depress_delay_ms).state);"
      - logger.log: { format: "* FILLING C: De-presurization done, bottle ready for removal process...", level: INFO }
      - switch.turn_off: "${devname}_c_valve_drizzle"
      - light.turn_on: { id: "${devname}_c_led_ok" }
      - logger.log: { format: "*** FILLING C: SCRIPT ENDED.", level: INFO }

  # SCRIPT: REMOVE BOTTLE
  - id: "${devname}_script_a_bottle_remove"
    mode: single
    then:
      - logger.log: { format: "***REMOVE A: SCRIPT STARTED...", level: INFO }
      - lambda: 'id(${devname}_a_led_ok).turn_on().set_effect("blinking").perform();'
      - light.turn_off: { id: "${devname}_a_led_startstop" }
      - if:
          condition:
            - lambda: "return (id(${devname}_co2_shock_length_ms).state > 0);"
          then:
            - logger.log: { format: "* REMOVE A: CO2 Shock", level: INFO }
            - switch.turn_on: "${devname}_a_valve_air"
            - delay: !lambda "return (id(${devname}_co2_shock_length_ms).state);"
            - switch.turn_off: "${devname}_a_valve_air"
            - delay: !lambda "return (id(${devname}_post_shock_delay_ms).state);"
      - switch.turn_on: "${devname}_a_valve_drizzle"
      - delay: 3s
      - light.turn_off: { id: "${devname}_a_led_ok" }
      - light.turn_on: { id: "${devname}_a_led_startstop" }
      - logger.log: { format: "*** REMOVE A: SCRIPT ENDED.", level: INFO }

  - id: "${devname}_script_b_bottle_remove"
    mode: single
    then:
      - logger.log: { format: "***REMOVE B: SCRIPT STARTED...", level: INFO }
      - lambda: 'id(${devname}_b_led_ok).turn_on().set_effect("blinking").perform();'
      - light.turn_off: { id: "${devname}_b_led_startstop" }
      - if:
          condition:
            - lambda: "return (id(${devname}_co2_shock_length_ms).state > 0);"
          then:
            - logger.log: { format: "* REMOVE B: CO2 Shock", level: INFO }
            - switch.turn_on: "${devname}_b_valve_air"
            - delay: !lambda "return (id(${devname}_co2_shock_length_ms).state);"
            - switch.turn_off: "${devname}_b_valve_air"
            - delay: !lambda "return (id(${devname}_post_shock_delay_ms).state);"
      - switch.turn_on: "${devname}_b_valve_drizzle"
      - delay: 3s
      - light.turn_off: { id: "${devname}_b_led_ok" }
      - light.turn_on: { id: "${devname}_b_led_startstop" }
      - logger.log: { format: "*** REMOVE B: SCRIPT ENDED.", level: INFO }

  - id: "${devname}_script_c_bottle_remove"
    mode: single
    then:
      - logger.log: { format: "***REMOVE C: SCRIPT STARTED...", level: INFO }
      - lambda: 'id(${devname}_c_led_ok).turn_on().set_effect("blinking").perform();'
      - light.turn_off: { id: "${devname}_c_led_startstop" }
      - if:
          condition:
            - lambda: "return (id(${devname}_co2_shock_length_ms).state > 0);"
          then:
            - logger.log: { format: "* REMOVE C: CO2 Shock", level: INFO }
            - switch.turn_on: "${devname}_c_valve_air"
            - delay: !lambda "return (id(${devname}_co2_shock_length_ms).state);"
            - switch.turn_off: "${devname}_c_valve_air"
            - delay: !lambda "return (id(${devname}_post_shock_delay_ms).state);"
      - switch.turn_on: "${devname}_c_valve_drizzle"
      - delay: 3s
      - light.turn_off: { id: "${devname}_c_led_ok" }
      - light.turn_on: { id: "${devname}_c_led_startstop" }
      - logger.log: { format: "*** REMOVE C: SCRIPT ENDED.", level: INFO }